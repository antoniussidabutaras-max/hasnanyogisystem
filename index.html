<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TOKO SEMBAKO HASNA DAN YOGI</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

nav{
background:#2c3e50;
padding:15px;
}

nav button{
margin-right:10px;
padding:10px 15px;
border:none;
background:#3498db;
color:white;
border-radius:5px;
cursor:pointer;
}

nav button:hover{
background:#2980b9;
}

.section{
display:none;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table,th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

input,select{
padding:6px;
margin:4px;
}

button.action{
padding:6px 10px;
margin:3px;
}

#dashboard{
display:block;
}

</style>
</head>

<body>

<nav>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('inventory')">Inventory</button>
<button onclick="showSection('stock')">Stock Masuk</button>
<button onclick="showSection('kasir')">Kasir</button>
<button onclick="showSection('hutang')">Hutang</button>
<button onclick="showSection('laporan')">Laporan</button>
</nav>

<!-- DASHBOARD -->

<div id="dashboard" class="section">
<div class="card">
<h2>TOKO SEMBAKO HASNA DAN YOGI</h2>

<h3>Alert Stok Minimum</h3>
<div id="stokAlert"></div>

</div>
</div>


<!-- INVENTORY -->

<div id="inventory" class="section">
<div class="card">

<h2>Inventory</h2>

<input id="barcode" placeholder="Barcode">
<button onclick="scanInventory()">Scan Kamera</button>

<div id="readerInventory" style="width:300px"></div>

<input id="namaBarang" placeholder="Nama Barang">

<select id="satuan">
<option>pcs</option>
<option>kg</option>
<option>ons</option>
<option>meter</option>
</select>

<input id="modal" type="number" placeholder="Harga Modal">
<input id="jual" type="number" placeholder="Harga Jual">
<input id="stok" type="number" placeholder="Stok">
<input id="stokMin" type="number" placeholder="Stok Minimum">

<button onclick="simpanBarang()">Simpan</button>

<button onclick="resetInventory()">Reset</button>

<input id="searchBarang" placeholder="Cari Barang" onkeyup="tampilBarang()">

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Satuan</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Min</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="listBarang"></tbody>

</table>

</div>
</div>


<!-- STOCK MASUK -->

<div id="stock" class="section">
<div class="card">

<h2>Stock Masuk</h2>

<input id="barcodeStock" placeholder="Barcode">
<input id="qtyStock" type="number" placeholder="Qty">

<button onclick="tambahStock()">Tambah Stock</button>

</div>
</div>


<!-- KASIR -->

<div id="kasir" class="section">
<div class="card">

<h2>Kasir</h2>

<input id="scanKasir" placeholder="Scan Barcode">
<button onclick="scanKasirCamera()">Scan Kamera</button>

<div id="readerKasir" style="width:300px"></div>

<input id="cariBarangKasir" placeholder="Cari Nama Barang" onkeyup="cariBarangKasir()">

<input id="qtyKasir" type="number" placeholder="Qty">

<button onclick="tambahKeranjang()">Tambah</button>

<h3>Keranjang</h3>

<table>
<thead>
<tr>
<th>Barang</th>
<th>Qty</th>
<th>Satuan</th>
<th>Harga</th>
<th>Subtotal</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="keranjang"></tbody>

</table>

<h3>Total : Rp <span id="total">0</span></h3>

<h3>Pembayaran</h3>

<input id="bayar" type="number" placeholder="Uang Bayar" oninput="hitungKembalian()">

<p>Kembalian : Rp <span id="kembali">0</span></p>

<button onclick="selesaiTransaksi()">Selesai</button>

<button onclick="printStruk()">Print Struk</button>

</div>
</div>


<!-- HUTANG -->

<div id="hutang" class="section">
<div class="card">

<h2>Data Hutang</h2>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Nama</th>
<th>Jumlah</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="listHutang"></tbody>

</table>

<button onclick="resetHutang()">Reset</button>

</div>
</div>


<!-- LAPORAN -->

<div id="laporan" class="section">
<div class="card">

<h2>Laporan Harian</h2>

<div id="laporanHari"></div>

<button onclick="exportExcel()">Export Excel</button>

<button onclick="resetLaporan()">Reset</button>

</div>
</div>



<script>

function showSection(id){

document.querySelectorAll('.section').forEach(s=>s.style.display='none')

document.getElementById(id).style.display='block'

if(id=="dashboard") alertStok()

if(id=="inventory") tampilBarang()

if(id=="hutang") tampilHutang()

if(id=="laporan") tampilLaporan()

}


function rupiah(x){

return x.toLocaleString("id-ID")

}


let inventory=JSON.parse(localStorage.getItem("inventory"))||[]

let transaksi=JSON.parse(localStorage.getItem("transaksi"))||[]

let hutang=JSON.parse(localStorage.getItem("hutang"))||[]


function simpanBarang(){

let data={
barcode:barcode.value,
nama:namaBarang.value,
satuan:satuan.value,
modal:Number(modal.value),
jual:Number(jual.value),
stok:Number(stok.value),
min:Number(stokMin.value)
}

inventory.push(data)

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilBarang()

}


function tampilBarang(){

listBarang.innerHTML=""

inventory.forEach(b=>{

listBarang.innerHTML+=`

<tr>

<td>${b.barcode}</td>

<td>${b.nama}</td>

<td>${b.satuan}</td>

<td>Rp ${rupiah(b.modal)}</td>

<td>Rp ${rupiah(b.jual)}</td>

<td>${b.stok}</td>

<td>${b.min}</td>

<td>

<button onclick="hapusBarang('${b.barcode}')">Hapus</button>

</td>

</tr>

`

})

}


function hapusBarang(k){

inventory=inventory.filter(i=>i.barcode!=k)

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilBarang()

}


function resetInventory(){

if(confirm("Reset Inventory?")){

inventory=[]

localStorage.removeItem("inventory")

tampilBarang()

}

}


let cart=[]

let total=0


function tambahKeranjang(){

let kode=scanKasir.value

let qty=Number(qtyKasir.value)

let barang=inventory.find(b=>b.barcode==kode)

if(!barang)return alert("Barang tidak ditemukan")

let subtotal=barang.jual*qty

cart.push({nama:barang.nama,qty,satuan:barang.satuan,harga:barang.jual,subtotal})

barang.stok-=qty

total+=subtotal

localStorage.setItem("inventory",JSON.stringify(inventory))

renderCart()

}


function renderCart(){

keranjang.innerHTML=""

cart.forEach((c,i)=>{

keranjang.innerHTML+=`

<tr>

<td>${c.nama}</td>

<td>${c.qty}</td>

<td>${c.satuan}</td>

<td>Rp ${rupiah(c.harga)}</td>

<td>Rp ${rupiah(c.subtotal)}</td>

<td><button onclick="hapusCart(${i})">Hapus</button></td>

</tr>

`

})

document.getElementById("total").innerText=rupiah(total)

}


function hapusCart(i){

total-=cart[i].subtotal

cart.splice(i,1)

renderCart()

}


function hitungKembalian(){

let bayarVal=Number(bayar.value)

let kembali=bayarVal-total

document.getElementById("kembali").innerText=kembali>0?rupiah(kembali):0

}


function selesaiTransaksi(){

let bayarVal=Number(bayar.value)

let today=new Date().toLocaleDateString()

if(bayarVal<total){

let nama=prompt("Nama pembeli (hutang):")

hutang.push({tanggal:today,nama,jumlah:total-bayarVal,status:"Belum Lunas"})

localStorage.setItem("hutang",JSON.stringify(hutang))

}

transaksi.push({tanggal:today,total})

localStorage.setItem("transaksi",JSON.stringify(transaksi))

cart=[]

total=0

renderCart()

alert("Transaksi selesai")

}


function tampilHutang(){

listHutang.innerHTML=""

hutang.forEach((h,i)=>{

listHutang.innerHTML+=`

<tr>

<td>${h.tanggal}</td>

<td>${h.nama}</td>

<td>Rp ${rupiah(h.jumlah)}</td>

<td>${h.status}</td>

<td><button onclick="lunasi(${i})">Lunasi</button></td>

</tr>

`

})

}


function lunasi(i){

hutang[i].status="Lunas"

localStorage.setItem("hutang",JSON.stringify(hutang))

tampilHutang()

}


function tampilLaporan(){

let today=new Date().toLocaleDateString()

let hari=transaksi.filter(t=>t.tanggal==today)

let totalHarian=hari.reduce((a,b)=>a+b.total,0)

laporanHari.innerHTML="Total Penjualan : Rp "+rupiah(totalHarian)

}


function exportExcel(){

let ws=XLSX.utils.json_to_sheet(transaksi)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Laporan")

XLSX.writeFile(wb,"laporan.xlsx")

}


function resetLaporan(){

if(confirm("Reset laporan?")){

transaksi=[]

localStorage.removeItem("transaksi")

tampilLaporan()

}

}


function resetHutang(){

if(confirm("Reset hutang?")){

hutang=[]

localStorage.removeItem("hutang")

tampilHutang()

}

}


function alertStok(){

stokAlert.innerHTML=""

inventory.forEach(b=>{

if(b.stok<=b.min){

stokAlert.innerHTML+=`⚠ ${b.nama} stok tinggal ${b.stok}<br>`

}

})

}

</script>

</body>
</html>
