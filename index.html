<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HasnaNYogi System</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
nav{background:#2c3e50;padding:15px}
nav button{margin-right:10px;padding:8px 15px;border:none;background:#3498db;color:white;cursor:pointer;border-radius:5px}
nav button:hover{background:#2980b9}
.section{display:none;padding:20px}
input{margin:5px;padding:5px}
table{border-collapse:collapse;width:100%;margin-top:10px}
table,th,td{border:1px solid #ccc;padding:8px;text-align:center}
#inventory{display:block}
.card{background:white;padding:15px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
</style>
</head>
<body>

<nav>
<button onclick="showSection('inventory')">Inventory</button>
<button onclick="showSection('transaksi')">Transaksi</button>
<button onclick="showSection('laporan')">Laporan</button>
</nav>

<!-- INVENTORY -->
<div id="inventory" class="section">
<div class="card">
<h2>Inventory</h2>

<input id="barcode" placeholder="Barcode">
<button onclick="startScan()">Scan Kamera</button>
<div id="reader" style="width:100%; max-width:400px;"></div>

<input id="nama" placeholder="Nama Barang">
<input id="modal" type="number" placeholder="Harga Modal">
<input id="jual" type="number" placeholder="Harga Jual">
<input id="stok" type="number" placeholder="Stok">
<button onclick="simpanBarang()">Simpan</button>
<br><br>
<button onclick="backupData()">Backup Data</button>
<button onclick="restoreData()">Restore Data</button>
<input type="file" id="fileInput" style="display:none" onchange="loadFile(event)">

<input id="search" placeholder="Cari Barang" onkeyup="tampilBarang()">

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="listBarang"></tbody>
</table>
</div>
</div>

<!-- TRANSAKSI -->
<div id="transaksi" class="section">
<div class="card">
<h2>Transaksi</h2>
<input id="scanBarcode" placeholder="Scan Barcode">
<input id="qty" type="number" placeholder="Qty">
<button onclick="tambahKeKeranjang()">Tambah</button>

<ul id="keranjangList"></ul>
<h3>Total: Rp <span id="total">0</span></h3>

<input id="bayar" type="number" placeholder="Uang Bayar">
<h3>Kembalian: Rp <span id="kembalian">0</span></h3>
<button onclick="selesaiTransaksi()">Selesai</button>
</div>
</div>

<!-- LAPORAN -->
<div id="laporan" class="section">
<div class="card">
<h2>Laporan Hari Ini</h2>
<div id="hasilLaporan"></div>
</div>
</div>

<!-- LIBRARY SCANNER -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

// NAVIGATION
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
if(id==="inventory") tampilBarang();
if(id==="laporan") tampilLaporan();
}

// INVENTORY
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

function simpanBarang(){
let kode = document.getElementById("barcode").value.trim();
let nama = document.getElementById("nama").value.trim();
let modal = Number(document.getElementById("modal").value);
let jual = Number(document.getElementById("jual").value);
let stok = Number(document.getElementById("stok").value);

if(!nama){ alert("Nama wajib diisi"); return; }

if(kode === ""){
kode = "AUTO-" + Date.now();
}

let existing = inventory.find(b => b.barcode === kode);

if(existing){
existing.nama = nama;
existing.modal = modal;
existing.jual = jual;
existing.stok = stok;
}else{
inventory.push({barcode:kode,nama,modal,jual,stok});
}

localStorage.setItem("inventory",JSON.stringify(inventory));
tampilBarang();

document.getElementById("barcode").value="";
document.getElementById("nama").value="";
document.getElementById("modal").value="";
document.getElementById("jual").value="";
document.getElementById("stok").value="";
}

function tampilBarang(){
let keyword = document.getElementById("search").value.toLowerCase();
let list = document.getElementById("listBarang");
list.innerHTML="";

inventory.filter(b=>b.nama.toLowerCase().includes(keyword))
.forEach(b=>{
list.innerHTML+=`
<tr>
<td>${b.barcode}</td>
<td>${b.nama}</td>
<td>${b.modal}</td>
<td>${b.jual}</td>
<td>${b.stok}</td>
<td>
<button onclick="editBarang('${b.barcode}')">Edit</button>
<button onclick="hapusBarang('${b.barcode}')">Hapus</button>
</td>
</tr>`;
});
}

function editBarang(kode){
let b=inventory.find(x=>x.barcode===kode);
document.getElementById("barcode").value=b.barcode;
document.getElementById("nama").value=b.nama;
document.getElementById("modal").value=b.modal;
document.getElementById("jual").value=b.jual;
document.getElementById("stok").value=b.stok;
}

function hapusBarang(kode){
inventory=inventory.filter(b=>b.barcode!==kode);
localStorage.setItem("inventory",JSON.stringify(inventory));
tampilBarang();
}

// SCANNER
let codeReader;

function startScan(){

codeReader = new ZXing.BrowserMultiFormatReader();

codeReader.listVideoInputDevices()
.then(videoInputDevices => {

let backCamera = videoInputDevices.find(device =>
device.label.toLowerCase().includes('back')
);

let selectedDeviceId = backCamera 
? backCamera.deviceId 
: videoInputDevices[videoInputDevices.length - 1].deviceId;

codeReader.decodeFromVideoDevice(selectedDeviceId, 'reader', (result, err) => {

if (result) {
document.getElementById("barcode").value = result.text;
codeReader.reset();
document.getElementById("reader").innerHTML="";
}

});

})
.catch(err => {
alert("Kamera tidak tersedia atau izin ditolak");
});

}
// TRANSAKSI
let transaksi=JSON.parse(localStorage.getItem("transaksi"))||[];
let keranjang=[];
let total=0;
let totalProfit=0;

function tambahKeKeranjang(){
let kode=document.getElementById("scanBarcode").value;
let qty=Number(document.getElementById("qty").value);
let barang=inventory.find(b=>b.barcode===kode);

if(!barang||barang.stok<qty){
alert("Barang tidak ada / stok kurang");
return;
}

let subtotal=barang.jual*qty;
let profit=(barang.jual-barang.modal)*qty;

keranjang.push({nama:barang.nama,qty,subtotal,profit});
barang.stok-=qty;
total+=subtotal;
totalProfit+=profit;

localStorage.setItem("inventory",JSON.stringify(inventory));

document.getElementById("scanBarcode").value="";
document.getElementById("qty").value="";

tampilBarang();
keranjangTampil();
}

function keranjangTampil(){
let list=document.getElementById("keranjangList");
list.innerHTML="";
keranjang.forEach(k=>{
list.innerHTML+=`<li>${k.nama} x${k.qty} = Rp ${k.subtotal}</li>`;
});
document.getElementById("total").innerText=total.toLocaleString('id-ID');
}

function selesaiTransaksi(){
let today=new Date().toLocaleDateString();
transaksi.push({tanggal:today,total,profit:totalProfit});
localStorage.setItem("transaksi",JSON.stringify(transaksi));

keranjang=[];
total=0;
totalProfit=0;
keranjangTampil();
alert("Transaksi selesai");
}

// LAPORAN
function tampilLaporan(){
let today=new Date().toLocaleDateString();
let hariIni=transaksi.filter(t=>t.tanggal===today);
let totalHarian=hariIni.reduce((a,b)=>a+b.total,0);
let profitHarian=hariIni.reduce((a,b)=>a+b.profit,0);

document.getElementById("hasilLaporan").innerHTML=`
Tanggal: ${today}<br>
Total Penjualan: Rp ${totalHarian.toLocaleString('id-ID')}<br>
Total Keuntungan: Rp ${profitHarian.toLocaleString('id-ID')}
`;
}

tampilBarang();

// ================= BACKUP & RESTORE =================

function backupData(){
let data = {
inventory: inventory,
transaksi: transaksi
};

let blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "backup-hasnanyogi.json";
a.click();
}

function restoreData(){
document.getElementById("fileInput").click();
}

function loadFile(event){
let file = event.target.files[0];
let reader = new FileReader();

reader.onload = function(e){
let data = JSON.parse(e.target.result);

inventory = data.inventory || [];
transaksi = data.transaksi || [];

localStorage.setItem("inventory", JSON.stringify(inventory));
localStorage.setItem("transaksi", JSON.stringify(transaksi));

alert("Data berhasil di-restore");
tampilBarang();
};

reader.readAsText(file);
}
  
</script>

<script src="https://unpkg.com/@zxing/library@latest"></script>
</body>
</html>
