<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TOKO SEMBAKO HASNA & YOGI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

nav{
display:flex;
flex-wrap:wrap;
background:#34495e;
}

nav button{
flex:1;
padding:12px;
border:none;
background:#34495e;
color:white;
font-size:14px;
}

nav button:hover{
background:#2c3e50;
}

.section{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
padding:8px 12px;
margin:3px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

table th,table td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.totalBox{
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
TOKO SEMBAKO HASNA & YOGI
</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('inventory')">Inventory</button>
<button onclick="show('kasir')">Kasir</button>
<button onclick="show('hutang')">Hutang</button>
<button onclick="show('laporan')">Laporan</button>
<button onclick="show('backup')">Backup</button>
<button onclick="show('grafik')">Grafik</button>

</nav>

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="card">

<h3>Realtime</h3>

<div id="clock"></div>

</div>

<div class="card">

<h3>Penjualan Hari Ini</h3>

<div id="salesToday">0</div>

</div>

<div class="card">

<h3>Untung Hari Ini</h3>

<div id="profitToday">0</div>

</div>

<div class="card">

<h3>Alert Stok</h3>

<div id="stockAlert"></div>

</div>

</div>

<!-- INVENTORY -->

<div id="inventory" class="section">

<div class="card">

<h3>Input Barang</h3>

<input id="inv_barcode" placeholder="Barcode">

<input id="inv_nama" placeholder="Nama Barang">

<input id="inv_kategori" placeholder="Kategori">

<select id="inv_satuan">

<option>pcs</option>
<option>kg</option>
<option>ons</option>

</select>

<input id="inv_modal" placeholder="Harga Modal">

<input id="inv_jual" placeholder="Harga Jual">

<input id="inv_stok" placeholder="Stok">

<button onclick="saveInventory()">Simpan</button>

</div>

<div class="card">

<h3>Data Inventory</h3>

<table>

<thead>

<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Kategori</th>
<th>Satuan</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="inventoryTable"></tbody>

</table>

</div>

</div>

<!-- KASIR -->

<div id="kasir" class="section">

<div class="card">

<input id="kasir_barcode" placeholder="Scan Barcode">

<input id="kasir_qty" placeholder="Qty">

<button onclick="addToCart()">Tambah</button>

</div>

<div class="card">

<table>

<thead>

<tr>
<th>Nama</th>
<th>Qty</th>
<th>Satuan</th>
<th>Harga</th>
<th>Subtotal</th>
</tr>

</thead>

<tbody id="kasirTable"></tbody>

</table>

<div class="totalBox">

Total : <span id="cartTotal">0</span>

</div>

</div>

</div>

<script>

let inventory = JSON.parse(localStorage.getItem("inventory")) || []
let transaksi = JSON.parse(localStorage.getItem("transaksi")) || []
let hutang = JSON.parse(localStorage.getItem("hutang")) || []

let keranjang=[]

function rupiah(n){

return "Rp "+Number(n).toLocaleString("id-ID")

}

function show(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function clock(){

let d=new Date()

document.getElementById("clock").innerHTML=
d.toLocaleDateString()+" "+d.toLocaleTimeString()

}

setInterval(clock,1000)

function saveInventory(){

let barcode=document.getElementById("inv_barcode").value
let nama=document.getElementById("inv_nama").value
let kategori=document.getElementById("inv_kategori").value
let satuan=document.getElementById("inv_satuan").value
let modal=parseFloat(inv_modal.value)
let jual=parseFloat(inv_jual.value)
let stok=parseFloat(inv_stok.value)

let item=inventory.find(i=>i.nama===nama)

if(item){

if(!item.barcodes.includes(barcode)){

item.barcodes.push(barcode)

}

}else{

inventory.push({

nama:nama,
barcodes:[barcode],
kategori:kategori,
satuan:satuan,
modal:modal,
jual:jual,
stok:stok

})

}

localStorage.setItem("inventory",JSON.stringify(inventory))

renderInventory()

}

function renderInventory(){

let table=document.getElementById("inventoryTable")

table.innerHTML=""

inventory.forEach((i,x)=>{

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${i.barcodes.join(",")}</td>
<td>${i.nama}</td>
<td>${i.kategori}</td>
<td>${i.satuan}</td>
<td>${rupiah(i.modal)}</td>
<td>${rupiah(i.jual)}</td>
<td>${i.stok}</td>

<td>

<button onclick="deleteItem(${x})">Hapus</button>

</td>

`

table.appendChild(tr)

})

}

function deleteItem(i){

inventory.splice(i,1)

localStorage.setItem("inventory",JSON.stringify(inventory))

renderInventory()

}

function findByBarcode(code){

return inventory.find(i=>i.barcodes.includes(code))

}

function addToCart(){

let code=document.getElementById("kasir_barcode").value
let qty=parseFloat(document.getElementById("kasir_qty").value)

let item=findByBarcode(code)

if(!item){

alert("Barang tidak ditemukan")

return

}

let exist=keranjang.find(k=>k.nama===item.nama)

if(exist){

exist.qty+=qty
exist.subtotal=exist.qty*exist.jual

}else{

keranjang.push({

nama:item.nama,
qty:qty,
satuan:item.satuan,
jual:item.jual,
subtotal:item.jual*qty

})

}

item.stok-=qty

localStorage.setItem("inventory",JSON.stringify(inventory))

renderCart()

renderInventory()

}

function renderCart(){

let table=document.getElementById("kasirTable")

table.innerHTML=""

let total=0

keranjang.forEach(i=>{

total+=i.subtotal

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${i.nama}</td>
<td>${i.qty}</td>
<td>${i.satuan}</td>
<td>${rupiah(i.jual)}</td>
<td>${rupiah(i.subtotal)}</td>

`

table.appendChild(tr)

})

document.getElementById("cartTotal").innerText=rupiah(total)

}

renderInventory()

</script>

</body>

</html>
