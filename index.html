<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<title>TOKO SEMBAKO HASNA & YOGI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

nav{
display:flex;
flex-wrap:wrap;
background:#34495e;
}

nav button{
flex:1;
padding:12px;
border:none;
color:white;
background:#34495e;
cursor:pointer;
}

nav button:hover{
background:#2c3e50;
}

.section{
display:none;
padding:15px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:8px 12px;
margin:3px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.alert{
color:red;
font-weight:bold;
}

@media (max-width:600px){

table{
font-size:12px;
}

}

</style>

</head>

<body>

<header>
TOKO SEMBAKO HASNA & YOGI
</header>

<nav>

<button onclick="showMenu('dashboard')">Dashboard</button>
<button onclick="showMenu('inventory')">Inventory</button>
<button onclick="showMenu('kasir')">Kasir</button>
<button onclick="showMenu('hutang')">Hutang</button>
<button onclick="showMenu('laporan')">Laporan</button>
<button onclick="showMenu('backup')">Backup</button>

</nav>

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<div class="card">

<h3 id="realtime"></h3>

<div id="stokAlert"></div>

<div>
Penjualan Hari Ini :
<b id="penjualanHari"></b>
</div>

<div>
Untung Hari Ini :
<b id="untungHari"></b>
</div>

<div>
Margin :
<b id="marginHari"></b>
</div>

</div>

</div>

<!-- INVENTORY -->

<div id="inventory" class="section">

<div class="card">

<h3>Input Barang</h3>

<input id="barcode" placeholder="Barcode">

<button onclick="startScan()">Scan Kamera</button>

<input id="namaBarang" placeholder="Nama Barang">

<select id="kategori">

<option>Rokok</option>
<option>Beras</option>
<option>Gula</option>
<option>Minyak</option>
<option>Mie Instan</option>
<option>Telur</option>
<option>Gas LPG</option>
<option>Air Mineral</option>
<option>Bumbu Dapur</option>
<option>Lainnya</option>

</select>

<select id="satuan">

<option>pcs</option>
<option>kg</option>
<option>ons</option>
<option>meter</option>

</select>

<input id="modal" type="number" placeholder="Harga Modal">

<input id="jual" type="number" placeholder="Harga Jual">

<input id="stok" type="number" placeholder="Stok">

<button onclick="simpanBarang()">Simpan</button>

<button onclick="resetInventory()">Reset</button>

<button onclick="exportInventory()">Export Excel</button>

<div id="reader"></div>

<table>

<thead>

<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Kategori</th>
<th>Satuan</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="listBarang"></tbody>

</table>

</div>

</div>

<!-- KASIR -->

<div id="kasir" class="section">

<div class="card">

<h3>Kasir</h3>

<input id="scanKasir" placeholder="Scan Barcode">

<button onclick="scanKasirCamera()">Scan Kamera</button>

<input id="qtyKasir" type="number" placeholder="Qty">

<button onclick="tambahKasir()">Tambah</button>

<button onclick="resetKasir()">Reset</button>

<table>

<thead>

<tr>
<th>Nama</th>
<th>Qty</th>
<th>Satuan</th>
<th>Harga</th>
<th>Total</th>
</tr>

</thead>

<tbody id="keranjang"></tbody>

</table>

<h3>Total : <span id="totalKasir">0</span></h3>

<input id="diskon" placeholder="Diskon %">

<input id="bayar" placeholder="Uang Bayar">

<h3>Kembalian : <span id="kembalian">0</span></h3>

<button onclick="bayarKasir()">Bayar</button>

<button onclick="printStruk()">Print Struk</button>

</div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

function rupiah(x){

return "Rp "+Number(x).toLocaleString('id-ID')+",-"

}

function showMenu(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

showMenu("dashboard")

setInterval(()=>{

let d=new Date()

document.getElementById("realtime").innerText=
d.toLocaleDateString()+" "+d.toLocaleTimeString()

},1000)

let inventory=JSON.parse(localStorage.getItem("inventory"))||[]

function simpanBarang(){

let barang={

barcode:barcode.value,
nama:namaBarang.value,
kategori:kategori.value,
satuan:satuan.value,
modal:Number(modal.value),
jual:Number(jual.value),
stok:Number(stok.value)

}

inventory.push(barang)

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilBarang()

}

function tampilBarang(){

listBarang.innerHTML=""

inventory.forEach(b=>{

listBarang.innerHTML+=`
<tr>
<td>${b.barcode}</td>
<td>${b.nama}</td>
<td>${b.kategori}</td>
<td>${b.satuan}</td>
<td>${rupiah(b.modal)}</td>
<td>${rupiah(b.jual)}</td>
<td>${b.stok}</td>
<td>
<button onclick="hapusBarang('${b.barcode}')">Hapus</button>
</td>
</tr>
`

})

}

function hapusBarang(k){

inventory=inventory.filter(b=>b.barcode!=k)

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilBarang()

}

tampilBarang()

let cart=[]
let total=0

function tambahKasir(){

let kode=scanKasir.value

let qty=Number(qtyKasir.value)

let barang=inventory.find(b=>b.barcode==kode)

if(!barang){alert("Barang tidak ditemukan");return}

let subtotal=barang.jual*qty

cart.push({

nama:barang.nama,
qty:qty,
satuan:barang.satuan,
harga:barang.jual,
total:subtotal

})

total+=subtotal

renderCart()

}

function renderCart(){

keranjang.innerHTML=""

cart.forEach(c=>{

keranjang.innerHTML+=`
<tr>
<td>${c.nama}</td>
<td>${c.qty}</td>
<td>${c.satuan}</td>
<td>${rupiah(c.harga)}</td>
<td>${rupiah(c.total)}</td>
</tr>
`

})

totalKasir.innerText=rupiah(total)

}

document.getElementById("bayar").addEventListener("input",function(){

let kembali=this.value-total

kembalian.innerText=rupiah(kembali)

})

function printStruk(){

window.print()

}

</script>

</body>

</html>
