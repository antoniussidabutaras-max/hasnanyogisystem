<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Hasnanyogi POS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Hasnanyogi POS</h1>

<nav>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('kasir')">Kasir</button>
<button onclick="showPage('inventory')">Inventory</button>
<button onclick="showPage('laporan')">Laporan</button>
<button onclick="showPage('hutang')">Hutang</button>

</nav>

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<h2>Dashboard</h2>

Total Produk : <span id="totalProduk"></span><br>
Omzet : <span id="omzet"></span><br>
Stok Menipis : <span id="stokMenipis"></span>

</div>


<!-- KASIR -->

<div id="kasir" class="section" style="display:none">

<h2>Kasir</h2>

<input id="kasir_barcode" placeholder="scan barcode / nama">
<input id="kasir_qty" type="number" value="1">

<button onclick="addCart()">Tambah</button>

<div id="infoBarang"></div>

<table border="1">

<thead>

<tr>
<th>Nama</th>
<th>Harga</th>
<th>Qty</th>
<th>Subtotal</th>
<th></th>
</tr>

</thead>

<tbody id="cartTable"></tbody>

</table>

<h3>Total : <span id="cartTotal">0</span></h3>

<button onclick="bayar()">Bayar</button>

</div>


<!-- INVENTORY -->

<div id="inventory" class="section" style="display:none">

<h2>Inventory</h2>

<input id="inv_nama" placeholder="nama">
<input id="inv_kategori" placeholder="kategori">
<input id="inv_satuan" placeholder="satuan">

<input id="inv_modal" placeholder="harga modal">
<input id="inv_jual" placeholder="harga jual">

<input id="inv_stok" placeholder="stok">
<input id="inv_minstok" placeholder="min stok">

<input id="inv_barcode1" placeholder="barcode 1">
<input id="inv_barcode2" placeholder="barcode 2">
<input id="inv_barcode3" placeholder="barcode 3">

<button onclick="saveBarang()">Simpan</button>

<br><br>

<button onclick="exportInventory()">Export Excel</button>

<table border="1">

<thead>

<tr>
<th>Nama</th>
<th>Kategori</th>
<th>Barcode</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Min</th>
<th></th>
</tr>

</thead>

<tbody id="inventoryTable"></tbody>

</table>

</div>


<!-- LAPORAN -->

<div id="laporan" class="section" style="display:none">

<h2>Laporan</h2>

<button onclick="exportLaporan()">Export Excel</button>

<table border="1">

<thead>

<tr>
<th>Tanggal</th>
<th>Total</th>
<th>Item</th>
</tr>

</thead>

<tbody id="laporanTable"></tbody>

</table>

</div>


<!-- HUTANG -->

<div id="hutang" class="section" style="display:none">

<h2>Hutang</h2>

<input id="hutang_nama" placeholder="nama">
<input id="hutang_jumlah" placeholder="jumlah">

<button onclick="tambahHutang()">Tambah</button>

<table border="1">

<thead>

<tr>
<th>Tanggal</th>
<th>Nama</th>
<th>Jumlah</th>
<th>Status</th>
<th></th>
</tr>

</thead>

<tbody id="hutangTable"></tbody>

</table>

</div>


<script src="js/database.js"></script>
<script src="js/inventory.js"></script>
<script src="js/kasir.js"></script>
<script src="js/laporan.js"></script>
<script src="js/hutang.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/main.js"></script>

</body>
</html>
