<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TOKO Sembako Hasna dan Yogi</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

nav{
background:#2c3e50;
padding:15px;
}

nav button{
margin-right:10px;
padding:8px 15px;
border:none;
background:#3498db;
color:white;
cursor:pointer;
border-radius:5px;
}

nav button:hover{
background:#2980b9;
}

.section{
display:none;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
padding:6px;
margin:4px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

#dashboard{
display:block;
}

</style>

</head>
<body>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('inventory')">Inventory</button>
<button onclick="show('kasir')">Kasir</button>
<button onclick="show('laporan')">Laporan</button>
<button onclick="show('hutang')">Hutang</button>

</nav>

<!-- DASHBOARD -->

<div id="dashboard" class="section">
<div class="card">

<h2>TOKO Sembako Hasna dan Yogi</h2>

<div id="dashboardData"></div>

</div>
</div>

<!-- INVENTORY -->

<div id="inventory" class="section">
<div class="card">

<h2>Inventory</h2>

<input id="barcode" placeholder="Barcode">
<button onclick="startScan()">Scan Kamera</button>

<div id="reader" style="width:300px"></div>

<input id="nama" placeholder="Nama Barang">
<input id="modal" type="number" placeholder="Harga Modal">
<input id="jual" type="number" placeholder="Harga Jual">

<select id="satuan">
<option>pcs</option>
<option>kg</option>
<option>ons</option>
<option>meter</option>
</select>

<input id="stok" type="number" placeholder="Stok">

<button onclick="simpanBarang()">Simpan</button>

<input id="searchBarang" placeholder="Cari Barang" onkeyup="tampilBarang()">

<table>

<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Satuan</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="listBarang"></tbody>

</table>

</div>
</div>

<!-- KASIR -->

<div id="kasir" class="section">
<div class="card">

<h2>Kasir</h2>

<input id="scanKasir" placeholder="Scan Barcode / Nama">

<input id="qty" type="number" value="1">

<button onclick="tambahKeranjang()">Tambah</button>

<ul id="keranjang"></ul>

<h3>Total : <span id="total">Rp 0,-</span></h3>

<input id="bayar" type="number" placeholder="Uang Bayar">

<h3>Kembalian : <span id="kembali">Rp 0,-</span></h3>

<button onclick="selesai()">Selesai Transaksi</button>

<button onclick="printStruk()">Print Struk</button>

</div>
</div>

<!-- LAPORAN -->

<div id="laporan" class="section">
<div class="card">

<h2>Laporan</h2>

<button onclick="exportExcel()">Export Excel</button>

<div id="laporanData"></div>

</div>
</div>

<!-- HUTANG -->

<div id="hutang" class="section">
<div class="card">

<h2>Hutang Pelanggan</h2>

<div id="hutangData"></div>

</div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

function rupiah(n){
return "Rp " + Number(n).toLocaleString("id-ID") + ",-"
}

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

if(id=="dashboard") dashboard()

if(id=="inventory") tampilBarang()

if(id=="laporan") tampilLaporan()

if(id=="hutang") tampilHutang()

}

let inventory=
JSON.parse(localStorage.getItem("inventory"))||[]

let transaksi=
JSON.parse(localStorage.getItem("transaksi"))||[]

let hutang=
JSON.parse(localStorage.getItem("hutang"))||[]

function simpanBarang(){

let kode=barcode.value.trim()

if(kode==""){
kode="AUTO-"+Date.now()
}

let barang={
barcode:kode,
nama:nama.value,
modal:Number(modal.value),
jual:Number(jual.value),
stok:Number(stok.value),
satuan:satuan.value
}

inventory.push(barang)

localStorage.setItem("inventory",JSON.stringify(inventory))

barcode.value=""
nama.value=""
modal.value=""
jual.value=""
stok.value=""

tampilBarang()

}

function tampilBarang(){

let k=searchBarang.value?.toLowerCase()||""

listBarang.innerHTML=""

inventory
.filter(b=>b.nama.toLowerCase().includes(k))
.forEach(b=>{

listBarang.innerHTML+=`

<tr>
<td>${b.barcode}</td>
<td>${b.nama}</td>
<td>${b.satuan}</td>
<td>${rupiah(b.modal)}</td>
<td>${rupiah(b.jual)}</td>
<td>${b.stok}</td>

<td>

<button onclick="hapusBarang('${b.barcode}')">
Hapus
</button>

</td>

</tr>

`

})

}

function hapusBarang(kode){

inventory=
inventory.filter(b=>b.barcode!=kode)

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilBarang()

}

let keranjang=[]

let total=0

function tambahKeranjang(){

let kode=scanKasir.value

let qtyVal=Number(qty.value)

let barang=
inventory.find(b=>
b.barcode==kode ||
b.nama.toLowerCase()==kode.toLowerCase()
)

if(!barang){
alert("Barang tidak ditemukan")
return
}

let existing=
keranjang.find(k=>k.barcode==barang.barcode)

if(existing){

existing.qty+=qtyVal

existing.subtotal=
existing.qty*barang.jual

}else{

keranjang.push({

barcode:barang.barcode,
nama:barang.nama,
qty:qtyVal,
harga:barang.jual,
modal:barang.modal,
subtotal:barang.jual*qtyVal

})

}

barang.stok-=qtyVal

total+=barang.jual*qtyVal

localStorage.setItem("inventory",JSON.stringify(inventory))

scanKasir.value=""

tampilKeranjang()

}

function tampilKeranjang(){

keranjang.innerHTML=""

keranjang.forEach(k=>{

document.getElementById("keranjang").innerHTML+=`

<li>

${k.nama}

${k.qty} ${k.satuan||""}

= ${rupiah(k.subtotal)}

</li>

`

})

document.getElementById("total").innerText=
rupiah(total)

}

bayar.oninput=function(){

let kembaliVal=
this.value-total

kembali.innerText=
rupiah(kembaliVal)

}

function selesai(){

let tgl=
new Date().toLocaleDateString()

let jam=
new Date().toLocaleTimeString()

let profit=
keranjang.reduce((a,b)=>

a+((b.harga-b.modal)*b.qty)

,0)

transaksi.push({

tanggal:tgl,
jam:jam,
total:total,
profit:profit,
items:keranjang

})

localStorage.setItem("transaksi",JSON.stringify(transaksi))

keranjang=[]

total=0

tampilKeranjang()

alert("Transaksi selesai")

}

function tampilLaporan(){

laporanData.innerHTML=""

transaksi.forEach(t=>{

laporanData.innerHTML+=`

<div>

${t.tanggal}

${t.jam}

Total

${rupiah(t.total)}

Profit

${rupiah(t.profit)}

</div>

`

})

}

function dashboard(){

let today=
new Date().toLocaleDateString()

let hari=
transaksi.filter(t=>t.tanggal==today)

let totalHari=
hari.reduce((a,b)=>a+b.total,0)

let profitHari=
hari.reduce((a,b)=>a+b.profit,0)

dashboardData.innerHTML=`

<h3>Penjualan Hari Ini : ${rupiah(totalHari)}</h3>

<h3>Keuntungan Hari Ini : ${rupiah(profitHari)}</h3>

<h3>Jumlah Transaksi : ${hari.length}</h3>

`

}

function startScan(){

const html5QrCode =
new Html5Qrcode("reader")

Html5Qrcode.getCameras()
.then(devices=>{

if(devices.length){

html5QrCode.start(

{ facingMode:"environment" },

{ fps:10, qrbox:250 },

(decoded)=>{

barcode.value=decoded

html5QrCode.stop()

reader.innerHTML=""

}

)

}

})

}

function exportExcel(){

let csv="Tanggal,Jam,Total,Profit\n"

transaksi.forEach(t=>{

csv+=`${t.tanggal},${t.jam},${t.total},${t.profit}\n`

})

let blob=
new Blob([csv])

let a=
document.createElement("a")

a.href=
URL.createObjectURL(blob)

a.download=
"laporan.csv"

a.click()

}

function tampilHutang(){

hutangData.innerHTML="Belum ada hutang"

}

dashboard()

</script>

</body>
</html>
