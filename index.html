<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TOKO Sembako Hasna dan Yogi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

nav{
background:#2c3e50;
padding:15px;
}

nav button{
margin-right:10px;
padding:10px;
border:none;
background:#3498db;
color:white;
cursor:pointer;
border-radius:5px;
}

.section{
display:none;
padding:20px;
}

#dashboard{
display:block;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

input,select{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('inventory')">Inventory</button>
<button onclick="show('kasir')">Kasir</button>
<button onclick="show('laporan')">Laporan</button>
<button onclick="show('hutang')">Hutang</button>

</nav>

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<div class="card">

<h2>TOKO Sembako Hasna dan Yogi</h2>

<div id="infoDashboard"></div>

</div>

</div>


<!-- INVENTORY -->

<div id="inventory" class="section">

<div class="card">

<h3>Tambah Barang</h3>

<input id="barcode" placeholder="Barcode">

<button onclick="scanInventory()">Scan Kamera</button>

<div id="readerInv"></div>

<br>

<input id="nama" placeholder="Nama Barang">

<select id="satuan">

<option>pcs</option>
<option>kg</option>
<option>ons</option>
<option>meter</option>

</select>

<input id="modal" placeholder="Harga Modal" type="number">
<input id="jual" placeholder="Harga Jual" type="number">
<input id="stok" placeholder="Stok" type="number">

<button onclick="simpanBarang()">Simpan</button>

</div>


<div class="card">

<h3>Data Inventory</h3>

<table>

<thead>

<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Satuan</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
</tr>

</thead>

<tbody id="tabelInventory"></tbody>

</table>

</div>

</div>



<!-- KASIR -->

<div id="kasir" class="section">

<div class="card">

<h3>Input Barang</h3>

<input id="scanBarcode" placeholder="Scan Barcode">

<button onclick="scanKasir()">Scan Kamera</button>

<div id="readerKasir"></div>

<br>

<input id="cariNama" placeholder="Cari Nama Barang">

<input id="qty" placeholder="Qty" type="number" value="1">

<button onclick="tambahKeranjang()">Tambah</button>

</div>


<div class="card">

<h3>Keranjang</h3>

<table>

<thead>

<tr>

<th>Nama</th>
<th>Satuan</th>
<th>Qty</th>
<th>Harga</th>
<th>Total</th>

</tr>

</thead>

<tbody id="keranjang"></tbody>

</table>

<h2>Total : <span id="total">Rp 0,-</span></h2>

<button onclick="selesai()">Selesai Transaksi</button>

</div>

</div>



<!-- LAPORAN -->

<div id="laporan" class="section">

<div class="card">

<h3>Laporan Hari Ini</h3>

<div id="isiLaporan"></div>

</div>

</div>



<!-- HUTANG -->

<div id="hutang" class="section">

<div class="card">

<h3>Input Hutang</h3>

<input id="namaHutang" placeholder="Nama Pelanggan">
<input id="jumlahHutang" placeholder="Jumlah" type="number">

<button onclick="simpanHutang()">Simpan</button>

</div>

<div class="card">

<h3>Daftar Hutang</h3>

<ul id="listHutang"></ul>

</div>

</div>



<script>

function rupiah(x){

return "Rp "+Number(x).toLocaleString("id-ID")+",-"

}

function show(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

tampilInventory()
tampilDashboard()
tampilLaporan()
tampilHutang()

}



let inventory=JSON.parse(localStorage.getItem("inventory"))||[]
let transaksi=JSON.parse(localStorage.getItem("transaksi"))||[]
let hutang=JSON.parse(localStorage.getItem("hutang"))||[]

let keranjang=[]
let total=0



function simpanBarang(){

let b={

barcode:barcode.value || "AUTO"+Date.now(),
nama:nama.value,
satuan:satuan.value,
modal:Number(modal.value),
jual:Number(jual.value),
stok:Number(stok.value)

}

inventory.push(b)

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilInventory()

}



function tampilInventory(){

let html=""

inventory.forEach(i=>{

html+=`

<tr>

<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.satuan}</td>
<td>${rupiah(i.modal)}</td>
<td>${rupiah(i.jual)}</td>
<td>${i.stok}</td>

</tr>

`

})

tabelInventory.innerHTML=html

}



function tambahKeranjang(){

let kode=scanBarcode.value

let namaCari=cariNama.value.toLowerCase()

let barang=inventory.find(i=>i.barcode==kode || i.nama.toLowerCase().includes(namaCari))

if(!barang){alert("Barang tidak ditemukan");return}

let q=Number(qty.value)

let subtotal=barang.jual*q

keranjang.push({

nama:barang.nama,
satuan:barang.satuan,
qty:q,
harga:barang.jual,
total:subtotal,
modal:barang.modal

})

barang.stok-=q

total+=subtotal

tampilKeranjang()

}



function tampilKeranjang(){

let html=""

keranjang.forEach(k=>{

html+=`

<tr>

<td>${k.nama}</td>
<td>${k.satuan}</td>
<td>${k.qty}</td>
<td>${rupiah(k.harga)}</td>
<td>${rupiah(k.total)}</td>

</tr>

`

})

document.getElementById("keranjang").innerHTML=html

document.getElementById("total").innerText=rupiah(total)

}



function selesai(){

let profit=0

keranjang.forEach(k=>{

profit+=(k.harga-k.modal)*k.qty

})

let data={

tanggal:new Date().toLocaleDateString(),
jam:new Date().toLocaleTimeString(),
items:keranjang,
total:total,
profit:profit

}

transaksi.push(data)

localStorage.setItem("transaksi",JSON.stringify(transaksi))

keranjang=[]
total=0

tampilKeranjang()

alert("Transaksi selesai")

}



function tampilLaporan(){

let hari=new Date().toLocaleDateString()

let html=""

transaksi.filter(t=>t.tanggal==hari).forEach(t=>{

t.items.forEach(i=>{

let profit=(i.harga-i.modal)*i.qty

let persen=((i.harga-i.modal)/i.modal*100).toFixed(1)

html+=`

<div>

${t.tanggal} ${t.jam} |

${i.nama} |

${i.qty} ${i.satuan} |

Modal ${rupiah(i.modal)} |

Jual ${rupiah(i.harga)} |

Untung ${rupiah(profit)} |

${persen} %

</div>

`

})

})

isiLaporan.innerHTML=html

}



function simpanHutang(){

hutang.push({

nama:namaHutang.value,
jumlah:Number(jumlahHutang.value)

})

localStorage.setItem("hutang",JSON.stringify(hutang))

tampilHutang()

}



function tampilHutang(){

let html=""

hutang.forEach(h=>{

html+=`<li>${h.nama} : ${rupiah(h.jumlah)}</li>`

})

listHutang.innerHTML=html

}



function tampilDashboard(){

let today=new Date().toLocaleDateString()

let hariIni=transaksi.filter(t=>t.tanggal==today)

let totalJual=hariIni.reduce((a,b)=>a+b.total,0)

let totalProfit=hariIni.reduce((a,b)=>a+b.profit,0)

infoDashboard.innerHTML=`

Penjualan Hari Ini : ${rupiah(totalJual)} <br>
Keuntungan Hari Ini : ${rupiah(totalProfit)} <br>
Jumlah Transaksi : ${hariIni.length}

`

}



function scanInventory(){

const html5QrCode = new Html5Qrcode("readerInv");

html5QrCode.start(

{ facingMode:"environment" },

{ fps:10, qrbox:250 },

(decodedText)=>{

barcode.value=decodedText

html5QrCode.stop()

document.getElementById("readerInv").innerHTML=""

}

)

}



function scanKasir(){

const html5QrCode = new Html5Qrcode("readerKasir");

html5QrCode.start(

{ facingMode:"environment" },

{ fps:10, qrbox:250 },

(decodedText)=>{

scanBarcode.value=decodedText

html5QrCode.stop()

document.getElementById("readerKasir").innerHTML=""

}

)

}



tampilInventory()
tampilDashboard()

</script>

</body>
</html>
