<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TOKO SEMBAKO HASNA & YOGI</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav{
background:#34495e;
padding:10px;
}

nav button{
margin:3px;
padding:8px 14px;
border:none;
background:#3498db;
color:white;
border-radius:5px;
cursor:pointer;
}

nav button:hover{
background:#2980b9;
}

.section{
display:none;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select{
padding:6px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table,th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#ecf0f1;
}

button.action{
padding:5px 10px;
margin:2px;
}

</style>
</head>

<body>

<header>TOKO SEMBAKO HASNA & YOGI</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('inventory')">Inventory</button>
<button onclick="show('stock')">Stock Masuk</button>
<button onclick="show('kasir')">Kasir</button>
<button onclick="show('hutang')">Hutang</button>
<button onclick="show('laporan')">Laporan</button>

</nav>

<div id="dashboard" class="section" style="display:block">
<div class="card">

<h2>Dashboard</h2>

<div id="dash"></div>

</div>
</div>

<div id="inventory" class="section">
<div class="card">

<h2>Inventory</h2>

<input id="barcode" placeholder="Barcode">
<button onclick="scan()">Scan</button>

<div id="reader"></div>

<input id="nama" placeholder="Nama Barang">

<select id="satuan">
<option>pcs</option>
<option>kg</option>
<option>ons</option>
<option>meter</option>
<option>liter</option>
</select>

<input id="modal" type="number" placeholder="Harga Modal">
<input id="jual" type="number" placeholder="Harga Jual">
<input id="stok" type="number" placeholder="Stok">

<button onclick="saveItem()">Simpan</button>

<button onclick="resetInventory()">Reset</button>

<table>

<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Satuan</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="invTable"></tbody>

</table>

</div>
</div>

<script>

function formatRupiah(n){
return "Rp "+n.toLocaleString("id-ID")+",-"
}

function show(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

loadInventory()
dashboard()

}

let inventory=JSON.parse(localStorage.getItem("inventory"))||[]

function saveItem(){

let code=barcode.value||"AUTO"+Date.now()

let item={
barcode:code,
nama:nama.value,
satuan:satuan.value,
modal:Number(modal.value),
jual:Number(jual.value),
stok:Number(stok.value)
}

let exist=inventory.find(i=>i.barcode==code)

if(exist){

Object.assign(exist,item)

}else{

inventory.push(item)

}

localStorage.setItem("inventory",JSON.stringify(inventory))

loadInventory()

}

function loadInventory(){

invTable.innerHTML=""

inventory.forEach(i=>{

invTable.innerHTML+=`

<tr>

<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.satuan}</td>
<td>${formatRupiah(i.modal)}</td>
<td>${formatRupiah(i.jual)}</td>
<td>${i.stok}</td>

<td>

<button onclick="editItem('${i.barcode}')">Edit</button>

<button onclick="deleteItem('${i.barcode}')">Hapus</button>

</td>

</tr>

`

})

}

function editItem(code){

let i=inventory.find(x=>x.barcode==code)

barcode.value=i.barcode
nama.value=i.nama
satuan.value=i.satuan
modal.value=i.modal
jual.value=i.jual
stok.value=i.stok

}

function deleteItem(code){

inventory=inventory.filter(i=>i.barcode!=code)

localStorage.setItem("inventory",JSON.stringify(inventory))

loadInventory()

}

function resetInventory(){

if(confirm("Reset inventory?")){

inventory=[]
localStorage.removeItem("inventory")
loadInventory()

}

}

function dashboard(){

let totalProduk=inventory.length

let stokTipis=inventory.filter(i=>i.stok<=5).length

dash.innerHTML=`

Total Produk : ${totalProduk} <br>

Stok Hampir Habis : ${stokTipis}

`

}

function scan(){

const html5QrCode=new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices=>{

html5QrCode.start(
devices[0].id,
{fps:10,qrbox:250},
(decoded)=>{

barcode.value=decoded

html5QrCode.stop()

reader.innerHTML=""

}

)

})

}

loadInventory()
dashboard()

</script>

</body>
</html>
