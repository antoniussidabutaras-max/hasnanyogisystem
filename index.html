<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HasnaNYogiSystem</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

nav{
background:#2c3e50;
padding:15px;
}

nav button{
margin-right:10px;
padding:8px 15px;
border:none;
background:#3498db;
color:white;
cursor:pointer;
border-radius:5px;
}

nav button:hover{
background:#2980b9;
}

.section{
display:none;
padding:20px;
}

#inventory{
display:block;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select{
margin:5px;
padding:6px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

table,th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

button.action{
padding:5px 10px;
margin:2px;
}

</style>
</head>

<body>

<nav>
<button onclick="showSection('inventory')">Inventory</button>
<button onclick="showSection('transaksi')">Transaksi</button>
<button onclick="showSection('laporan')">Laporan</button>
</nav>

<!-- INVENTORY -->

<div id="inventory" class="section">

<div class="card">

<h2>Inventory Barang</h2>

<input id="barcode" placeholder="Barcode">
<button onclick="startScan()">Scan Kamera</button>

<div id="reader" style="width:300px"></div>

<br>

<input id="nama" placeholder="Nama Barang">

<input id="modal" type="number" placeholder="Harga Modal">

<input id="jual" type="number" placeholder="Harga Jual">

<input id="stok" type="number" placeholder="Stok">

<select id="satuan">

<option value="pcs">pcs</option>
<option value="kg">kg</option>
<option value="ons">ons</option>
<option value="meter">meter</option>

</select>

<button onclick="simpanBarang()">Simpan</button>

<input id="search" placeholder="Cari Barang" onkeyup="tampilBarang()">

<button onclick="exportInventory()">Export Inventory</button>

<table>

<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Satuan</th>
<th>Tanggal</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="listBarang"></tbody>

</table>

</div>

</div>

<!-- TRANSAKSI -->

<div id="transaksi" class="section">

<div class="card">

<h2>Transaksi</h2>

<input id="scanBarcode" placeholder="Scan Barcode">

<input id="qty" type="number" value="1">

<button onclick="tambahKeranjang()">Tambah</button>

<ul id="keranjang"></ul>

<h3>Total: Rp <span id="total">0</span></h3>

<input id="bayar" type="number" placeholder="Uang Bayar">

<h3>Kembalian: Rp <span id="kembalian">0</span></h3>

<button onclick="selesaiTransaksi()">Selesai</button>

</div>

</div>

<!-- LAPORAN -->

<div id="laporan" class="section">

<div class="card">

<h2>Laporan Penjualan</h2>

<button onclick="exportLaporan()">Export Laporan</button>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Barcode</th>
<th>Nama</th>
<th>Qty</th>
<th>Satuan</th>
<th>Modal</th>
<th>Jual</th>
<th>Untung</th>
<th>Margin %</th>
</tr>
</thead>

<tbody id="laporanTable"></tbody>

</table>

</div>

</div>

<script>

function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

if(id=="inventory") tampilBarang()

if(id=="laporan") tampilLaporan()

}

function formatRupiah(x){

return Number(x).toLocaleString("id-ID")

}

let inventory=JSON.parse(localStorage.getItem("inventory"))||[]

let transaksi=JSON.parse(localStorage.getItem("transaksi"))||[]

let keranjang=[]

let total=0

function startScan(){

const html5QrCode=new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices=>{

let backCamera=devices.find(d=>d.label.toLowerCase().includes("back"))||devices[0]

html5QrCode.start(

backCamera.id,

{fps:10,qrbox:250},

(decodedText)=>{

document.getElementById("barcode").value=decodedText

html5QrCode.stop()

document.getElementById("reader").innerHTML=""

}

)

})

}

function simpanBarang(){

let kode=barcode.value.trim()

let namaBarang=nama.value.trim()

let modalVal=Number(modal.value)

let jualVal=Number(jual.value)

let stokVal=Number(stok.value)

let satuanVal=satuan.value

let tanggal=new Date().toLocaleDateString()

if(kode==""){

kode="AUTO-"+Date.now()

}

let existing=inventory.find(b=>b.barcode==kode)

if(existing){

existing.nama=namaBarang

existing.modal=modalVal

existing.jual=jualVal

existing.stok=stokVal

existing.satuan=satuanVal

}else{

inventory.push({

barcode:kode,

nama:namaBarang,

modal:modalVal,

jual:jualVal,

stok:stokVal,

satuan:satuanVal,

tanggal:tanggal

})

}

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilBarang()

barcode.value=nama.value=modal.value=jual.value=stok.value=""

}

function tampilBarang(){

let keyword=search.value?search.value.toLowerCase():""

listBarang.innerHTML=""

inventory

.filter(b=>b.nama.toLowerCase().includes(keyword))

.forEach(b=>{

listBarang.innerHTML+=`

<tr>

<td>${b.barcode}</td>

<td>${b.nama}</td>

<td>${formatRupiah(b.modal)}</td>

<td>${formatRupiah(b.jual)}</td>

<td>${b.stok}</td>

<td>${b.satuan}</td>

<td>${b.tanggal}</td>

<td>

<button onclick="editBarang('${b.barcode}')">Edit</button>

<button onclick="hapusBarang('${b.barcode}')">Hapus</button>

</td>

</tr>

`

})

}

function editBarang(k){

let b=inventory.find(x=>x.barcode==k)

barcode.value=b.barcode

nama.value=b.nama

modal.value=b.modal

jual.value=b.jual

stok.value=b.stok

satuan.value=b.satuan

}

function hapusBarang(k){

inventory=inventory.filter(x=>x.barcode!=k)

localStorage.setItem("inventory",JSON.stringify(inventory))

tampilBarang()

}

function tambahKeranjang(){

let kode=scanBarcode.value

let qtyVal=Number(qty.value)

let barang=inventory.find(b=>b.barcode==kode)

if(!barang||barang.stok<qtyVal){

alert("Barang tidak ada atau stok kurang")

return

}

let subtotal=barang.jual*qtyVal

let profit=(barang.jual-barang.modal)*qtyVal

keranjang.push({

tanggal:new Date().toLocaleDateString(),

barcode:barang.barcode,

nama:barang.nama,

qty:qtyVal,

satuan:barang.satuan,

modal:barang.modal,

jual:barang.jual,

profit:profit

})

barang.stok-=qtyVal

total+=subtotal

localStorage.setItem("inventory",JSON.stringify(inventory))

scanBarcode.value=""

keranjangTampil()

}

function keranjangTampil(){

keranjang.innerHTML=""

keranjang.forEach(k=>{

keranjang.innerHTML+=`<li>${k.nama} x${k.qty} ${k.satuan}</li>`

})

document.getElementById("total").innerText=formatRupiah(total)

}

bayar.oninput=function(){

let kembali=this.value-total

kembalian.innerText=kembali>0?formatRupiah(kembali):0

}

function selesaiTransaksi(){

transaksi.push(...keranjang)

localStorage.setItem("transaksi",JSON.stringify(transaksi))

keranjang=[]

total=0

keranjangTampil()

alert("Transaksi selesai")

}

function tampilLaporan(){

laporanTable.innerHTML=""

transaksi.forEach(t=>{

let margin=((t.jual-t.modal)/t.modal*100).toFixed(1)

laporanTable.innerHTML+=`

<tr>

<td>${t.tanggal}</td>

<td>${t.barcode}</td>

<td>${t.nama}</td>

<td>${t.qty}</td>

<td>${t.satuan}</td>

<td>${formatRupiah(t.modal)}</td>

<td>${formatRupiah(t.jual)}</td>

<td>${formatRupiah(t.profit)}</td>

<td>${margin}%</td>

</tr>

`

})

}

function exportInventory(){

let ws=XLSX.utils.json_to_sheet(inventory)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Inventory")

XLSX.writeFile(wb,"inventory.xlsx")

}

function exportLaporan(){

let ws=XLSX.utils.json_to_sheet(transaksi)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Laporan")

XLSX.writeFile(wb,"laporan_penjualan.xlsx")

}

tampilBarang()

</script>

</body>
</html>
