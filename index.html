<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TOKO Sembako Hasna dan Yogi</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
font-size:20px;
}

.container{
display:flex;
}

.sidebar{
width:200px;
background:#34495e;
min-height:100vh;
color:white;
}

.sidebar button{
width:100%;
padding:12px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#2c3e50;
}

.content{
flex:1;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#eee;
}

input,select{
padding:6px;
margin:4px;
}

.btn{
padding:8px 12px;
cursor:pointer;
}

.green{background:#27ae60;color:white}
.red{background:#c0392b;color:white}
.blue{background:#2980b9;color:white}

</style>
</head>

<body>

<header>
TOKO Sembako Hasna dan Yogi
</header>

<div class="container">

<div class="sidebar">

<button onclick="menu('dashboard')">Dashboard</button>
<button onclick="menu('kasir')">Kasir</button>
<button onclick="menu('produk')">Produk</button>
<button onclick="menu('stok')">Stok Masuk</button>
<button onclick="menu('hutang')">Hutang</button>
<button onclick="menu('laporan')">Laporan</button>

</div>

<div class="content" id="content"></div>

</div>

<script>

let produk=JSON.parse(localStorage.getItem("produk"))||[]
let transaksi=JSON.parse(localStorage.getItem("transaksi"))||[]
let hutang=JSON.parse(localStorage.getItem("hutang"))||[]

function save(){

localStorage.setItem("produk",JSON.stringify(produk))
localStorage.setItem("transaksi",JSON.stringify(transaksi))
localStorage.setItem("hutang",JSON.stringify(hutang))

}

function rupiah(n){

return "Rp "+n.toLocaleString("id-ID")+",-"

}

function menu(m){

if(m=="dashboard")dashboard()
if(m=="produk")produkMenu()
if(m=="kasir")kasirMenu()
if(m=="stok")stokMenu()
if(m=="hutang")hutangMenu()
if(m=="laporan")laporanMenu()

}

function dashboard(){

let totalStok=produk.reduce((a,b)=>a+b.stok,0)

document.getElementById("content").innerHTML=`

<h2>Dashboard</h2>

Total Produk : ${produk.length}<br>
Total Stok : ${totalStok}

`

}

function produkMenu(){

let html=`

<h2>Produk</h2>

<input id="nama" placeholder="Nama">
<input id="barcode" placeholder="Barcode">
<input id="modal" type="number" placeholder="Harga Modal">
<input id="jual" type="number" placeholder="Harga Jual">
<input id="satuan" placeholder="Satuan">
<input id="stok" type="number" placeholder="Stok">

<button class="btn green" onclick="tambahProduk()">Tambah</button>
<button class="btn red" onclick="resetProduk()">Reset</button>

<br><br>

<table>

<tr>
<th>Nama</th>
<th>Barcode</th>
<th>Stok</th>
<th>Modal</th>
<th>Jual</th>
</tr>

`

produk.forEach(p=>{

html+=`

<tr>
<td>${p.nama}</td>
<td>${p.barcode}</td>
<td>${p.stok}</td>
<td>${rupiah(p.modal)}</td>
<td>${rupiah(p.jual)}</td>
</tr>

`

})

html+="</table>"

document.getElementById("content").innerHTML=html

}

function tambahProduk(){

let p={

nama:nama.value,
barcode:barcode.value,
modal:Number(modal.value),
jual:Number(jual.value),
satuan:satuan.value,
stok:Number(stok.value)

}

produk.push(p)

save()
produkMenu()

}

function resetProduk(){

if(confirm("hapus semua produk?")){

produk=[]
save()
produkMenu()

}

}

let keranjang=[]

function kasirMenu(){

let html=`

<h2>Kasir</h2>

<input id="scan" placeholder="scan barcode">

<button class="btn blue" onclick="scanBarang()">Tambah</button>

<br><br>

<table>

<tr>
<th>Barang</th>
<th>Harga</th>
<th>Qty</th>
<th>Total</th>
</tr>

`

let total=0

keranjang.forEach(k=>{

let t=k.qty*k.jual

total+=t

html+=`

<tr>
<td>${k.nama}</td>
<td>${rupiah(k.jual)}</td>
<td>${k.qty}</td>
<td>${rupiah(t)}</td>
</tr>

`

})

html+=`

</table>

<h3>Total : ${rupiah(total)}</h3>

Diskon % <input id="diskon" type="number">

<br><br>

Bayar <input id="bayar" type="number">

<button class="btn green" onclick="bayar()">Bayar</button>

`

document.getElementById("content").innerHTML=html

}

function scanBarang(){

let kode=scan.value

let p=produk.find(x=>x.barcode==kode)

if(!p)return alert("barang tidak ada")

let k=keranjang.find(x=>x.barcode==kode)

if(k){

k.qty++

}else{

keranjang.push({...p,qty:1})

}

kasirMenu()

}

function bayar(){

let total=keranjang.reduce((a,b)=>a+(b.qty*b.jual),0)

let d=Number(diskon.value)||0

total=total-(total*d/100)

let uang=Number(bayar.value)

let kembali=uang-total

if(kembali<0){

let nama=prompt("Nama pembeli hutang")

hutang.push({

nama:nama,
sisa:Math.abs(kembali),
tanggal:new Date().toLocaleDateString()

})

}

keranjang.forEach(k=>{

let p=produk.find(x=>x.barcode==k.barcode)

p.stok-=k.qty

})

transaksi.push({

tanggal:new Date(),
items:keranjang

})

keranjang=[]

save()

alert("transaksi selesai")

kasirMenu()

}

function stokMenu(){

document.getElementById("content").innerHTML=`

<h2>Stok Masuk</h2>

Barcode <input id="b">

Qty <input id="q" type="number">

<button onclick="stokMasuk()">Tambah</button>

`

}

function stokMasuk(){

let p=produk.find(x=>x.barcode==b.value)

if(!p)return alert("tidak ada")

p.stok+=Number(q.value)

save()

alert("stok ditambah")

}

function hutangMenu(){

let html="<h2>Hutang</h2><table><tr><th>Nama</th><th>Sisa</th><th>Tanggal</th></tr>"

hutang.forEach(h=>{

html+=`<tr><td>${h.nama}</td><td>${rupiah(h.sisa)}</td><td>${h.tanggal}</td></tr>`

})

html+="</table>"

content.innerHTML=html

}

function laporanMenu(){

let hari=new Date().toLocaleDateString()

let data={}

transaksi.forEach(t=>{

t.items.forEach(i=>{

if(!data[i.nama]){

data[i.nama]={

qty:0,
modal:i.modal,
jual:i.jual

}

}

data[i.nama].qty+=i.qty

})

})

let html=`<h2>Laporan Hari Ini</h2>

<table>

<tr>
<th>Barang</th>
<th>Qty</th>
<th>Modal</th>
<th>Jual</th>
<th>Penjualan</th>
<th>Untung</th>
<th>%</th>
</tr>

`

let totalModal=0
let totalJual=0

for(let k in data){

let d=data[k]

let modal=d.qty*d.modal
let jual=d.qty*d.jual
let untung=jual-modal
let persen=Math.round((untung/modal)*100)

totalModal+=modal
totalJual+=jual

html+=`

<tr>

<td>${k}</td>
<td>${d.qty}</td>
<td>${rupiah(d.modal)}</td>
<td>${rupiah(d.jual)}</td>
<td>${rupiah(jual)}</td>
<td>${rupiah(untung)}</td>
<td>${persen}%</td>

</tr>

`

}

let totalUntung=totalJual-totalModal

let persenTotal=Math.round((totalUntung/totalModal)*100)

html+=`

</table>

<br>

Total Modal : ${rupiah(totalModal)}<br>
Total Penjualan : ${rupiah(totalJual)}<br>
Total Untung : ${rupiah(totalUntung)}<br>
Persentase : ${persenTotal}%

`

content.innerHTML=html

}

dashboard()

</script>

</body>
</html>
