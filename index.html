<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HasnaNYogiSystem</title>
<style>
body { font-family: Arial; margin:20px; }
button { margin:5px; padding:5px 10px; }
input { margin:5px; }
.section { display:none; margin-top:20px; }
</style>
</head>
<body>

<h2>HasnaNYogiSystem</h2>

<button onclick="showSection('inventory')">Inventory</button>
<button onclick="showSection('transaksi')">Transaksi</button>
<button onclick="showSection('laporan')">Laporan</button>

<!-- INVENTORY MODERN -->
<div id="inventory" class="section">

<h3>Tambah / Edit Barang</h3>
<input id="barcode" placeholder="Barcode">
<input id="nama" placeholder="Nama Barang">
<input id="modal" type="number" placeholder="Harga Modal">
<input id="jual" type="number" placeholder="Harga Jual">
<input id="stok" type="number" placeholder="Stok">
<button onclick="simpanBarang()">Simpan / Update</button>

<hr>

<input id="search" placeholder="Cari Barang..." onkeyup="tampilBarang()">

<h3>Daftar Barang</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Modal</th>
<th>Jual</th>
<th>Stok</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="listBarang"></tbody>
</table>

</div>

<!-- TRANSAKSI -->
<div id="transaksi" class="section">
<h3>Transaksi</h3>
<input id="scanBarcode" placeholder="Scan / Input Barcode">
<input id="qty" type="number" placeholder="Qty">
<button onclick="tambahKeKeranjang()">Tambah</button>

<ul id="keranjang"></ul>
<h3>Total: <span id="total">0</span></h3>
<button onclick="selesaiTransaksi()">Selesai Transaksi</button>
</div>

<!-- LAPORAN -->
<div id="laporan" class="section">
<h3>Laporan Hari Ini</h3>
<div id="hasilLaporan"></div>
</div>

<script>
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
let transaksi = JSON.parse(localStorage.getItem("transaksi")) || [];
let keranjang = [];
let total = 0;
let totalProfit = 0;

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
if(id==="inventory") tampilBarang();
if(id==="laporan") tampilLaporan();
}

<script>

function simpanBarang(){
let kode = barcode.value;
let existing = inventory.find(b=>b.barcode===kode);

if(existing){
existing.nama = nama.value;
existing.modal = Number(modal.value);
existing.jual = Number(jual.value);
existing.stok = Number(stok.value);
alert("Barang berhasil diupdate");
}else{
inventory.push({
barcode: kode,
nama: nama.value,
modal: Number(modal.value),
jual: Number(jual.value),
stok: Number(stok.value)
});
alert("Barang berhasil ditambahkan");
}

localStorage.setItem("inventory", JSON.stringify(inventory));
tampilBarang();
clearForm();
}

function tampilBarang(){
let keyword = search.value.toLowerCase();
listBarang.innerHTML="";

inventory
.filter(b=>b.nama.toLowerCase().includes(keyword))
.forEach(b=>{
listBarang.innerHTML += `
<tr>
<td>${b.barcode}</td>
<td>${b.nama}</td>
<td>${b.modal}</td>
<td>${b.jual}</td>
<td>${b.stok}</td>
<td>
<button onclick="editBarang('${b.barcode}')">Edit</button>
<button onclick="hapusBarang('${b.barcode}')">Hapus</button>
<button onclick="restock('${b.barcode}',10)">+10</button>
<button onclick="restock('${b.barcode}',20)">+20</button>
</td>
</tr>
`;
});
}

function editBarang(kode){
let b = inventory.find(b=>b.barcode===kode);
barcode.value = b.barcode;
nama.value = b.nama;
modal.value = b.modal;
jual.value = b.jual;
stok.value = b.stok;
}

function hapusBarang(kode){
if(confirm("Yakin hapus barang?")){
inventory = inventory.filter(b=>b.barcode!==kode);
localStorage.setItem("inventory", JSON.stringify(inventory));
tampilBarang();
}
}

function restock(kode,jumlah){
let b = inventory.find(b=>b.barcode===kode);
b.stok += jumlah;
localStorage.setItem("inventory", JSON.stringify(inventory));
tampilBarang();
}

function clearForm(){
barcode.value="";
nama.value="";
modal.value="";
jual.value="";
stok.value="";
}

function tambahKeKeranjang(){
let kode = scanBarcode.value;
let qtyVal = Number(qty.value);
let barang = inventory.find(b=>b.barcode===kode);

if(!barang){ alert("Barang tidak ditemukan"); return; }
if(barang.stok < qtyVal){ alert("Stok tidak cukup"); return; }

let subtotal = barang.jual * qtyVal;
let profit = (barang.jual - barang.modal) * qtyVal;

keranjang.push({nama:barang.nama, qty:qtyVal, subtotal, profit});
barang.stok -= qtyVal;

total += subtotal;
totalProfit += profit;

keranjangTampil();
localStorage.setItem("inventory", JSON.stringify(inventory));
}

function keranjangTampil(){
keranjang.innerHTML="";
keranjang.forEach(k=>{
keranjang.innerHTML += `<li>${k.nama} x${k.qty} = ${k.subtotal}</li>`;
});
document.getElementById("total").innerText = total;
}

function selesaiTransaksi(){
let today = new Date().toLocaleDateString();
transaksi.push({tanggal:today, total, profit:totalProfit});
localStorage.setItem("transaksi", JSON.stringify(transaksi));

keranjang=[];
total=0;
totalProfit=0;
keranjangTampil();
alert("Transaksi selesai");
}

function tampilLaporan(){
let today = new Date().toLocaleDateString();
let hariIni = transaksi.filter(t=>t.tanggal===today);

let totalHarian = hariIni.reduce((a,b)=>a+b.total,0);
let profitHarian = hariIni.reduce((a,b)=>a+b.profit,0);

hasilLaporan.innerHTML = `
Tanggal: ${today}<br>
Total Penjualan: ${totalHarian}<br>
Total Keuntungan: ${profitHarian}
`;
}
</script>

</body>
</html>
